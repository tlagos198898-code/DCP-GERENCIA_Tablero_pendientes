<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tablero DCP Consulting</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:         #f0f2f7;
    --surface:    #ffffff;
    --card:       #ffffff;
    --border:     #dde1eb;
    --border-soft:#eaecf3;
    --text:       #1a1e2e;
    --muted:      #7b82a0;
    --accent:     #4f6ef7;

    --col-soc:  #7c3aed;
    --col-com:  #0ea5e9;
    --col-est:  #16a34a;
    --col-dia:  #f59e0b;
    --col-def:  #64748b;

    --sem-verde:    #16a34a;
    --sem-amarillo: #d97706;
    --sem-rojo:     #dc2626;
  }

  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* HEADER */
  header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 16px 32px; display: flex; align-items: center;
    justify-content: space-between; position: sticky; top: 0; z-index: 10;
    box-shadow: 0 1px 4px rgba(0,0,0,.06);
  }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .logo {
    width: 36px; height: 36px; background: var(--accent); border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Mono', monospace; font-weight: 500; font-size: 13px; color: #fff;
  }
  header h1 { font-size: 16px; font-weight: 700; letter-spacing: -.3px; }
  header p  { font-size: 12px; color: var(--muted); margin-top: 1px; }
  .header-right { display: flex; align-items: center; gap: 10px; }
  #status-indicator { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--muted); display: flex; align-items: center; gap: 6px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--sem-verde); animation: pulse 2s infinite; }
  .dot.loading { background: var(--sem-amarillo); animation: none; }
  .dot.error   { background: var(--sem-rojo); animation: none; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  #refresh-btn {
    background: transparent; border: 1px solid var(--border); color: var(--muted);
    border-radius: 6px; padding: 5px 12px; font-size: 11px;
    font-family: 'DM Mono', monospace; cursor: pointer; transition: all .15s;
  }
  #refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* FILTERS */
  .filters {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 12px 32px; display: flex; flex-wrap: wrap; gap: 20px; align-items: flex-end;
  }
  .filter-group { display: flex; flex-direction: column; gap: 5px; }
  .filter-group-label {
    font-size: 10px; font-weight: 600; letter-spacing: .6px;
    text-transform: uppercase; color: var(--muted); font-family: 'DM Mono', monospace;
  }
  .filter-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .filter-btn {
    background: transparent; border: 1px solid var(--border); color: var(--muted);
    border-radius: 20px; padding: 4px 12px; font-size: 11px; cursor: pointer;
    transition: all .15s; font-family: 'Inter', sans-serif; white-space: nowrap;
  }
  .filter-btn:hover  { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* BOARD */
  .board {
    display: flex; gap: 20px; padding: 24px 32px;
    align-items: flex-start; overflow-x: auto; min-height: calc(100vh - 170px);
  }

  .column {
    flex: 1; min-width: 280px; max-width: 380px;
    background: var(--surface); border-radius: 12px;
    border: 1px solid var(--border); overflow: hidden;
    box-shadow: 0 1px 3px rgba(0,0,0,.05);
  }
  .col-header {
    padding: 14px 16px; display: flex; align-items: center;
    justify-content: space-between; border-bottom: 1px solid var(--border-soft);
  }
  .col-header-left { display: flex; align-items: center; gap: 10px; }
  .col-stripe { width: 3px; height: 20px; border-radius: 2px; }
  .col-title { font-size: 13px; font-weight: 700; letter-spacing: .4px; text-transform: uppercase; }
  .col-count {
    background: var(--bg); color: var(--muted); border-radius: 10px;
    padding: 2px 9px; font-size: 11px; font-family: 'DM Mono', monospace;
    border: 1px solid var(--border);
  }
  .col-body { padding: 12px; display: flex; flex-direction: column; gap: 10px; min-height: 80px; }

  /* CARD */
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 14px;
    transition: transform .12s, box-shadow .12s;
    border-left: 3px solid transparent;
  }
  .card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,.09); }
  .card[data-pri="ALTA"]  { border-left-color: var(--sem-rojo); }
  .card[data-pri="MEDIA"] { border-left-color: var(--sem-amarillo); }
  .card[data-pri="BAJA"]  { border-left-color: var(--sem-verde); }

  .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 6px; }
  .card-title { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.35; }

  .estado-badge {
    font-size: 9px; font-weight: 700; border-radius: 4px; padding: 2px 6px;
    font-family: 'DM Mono', monospace; text-transform: uppercase;
    letter-spacing: .4px; flex-shrink: 0; margin-top: 2px;
  }
  .estado-abierto { background: #eff6ff; color: #2563eb; }
  .estado-cerrado { background: #f0fdf4; color: #16a34a; }

  .card-detail { font-size: 12px; color: var(--muted); line-height: 1.5; margin-bottom: 10px; }

  .card-footer { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 6px; }

  .badge {
    font-size: 10px; font-weight: 600; border-radius: 4px; padding: 2px 7px;
    font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: .3px;
  }
  .badge-alta  { background: #fef2f2; color: var(--sem-rojo); }
  .badge-media { background: #fffbeb; color: var(--sem-amarillo); }
  .badge-baja  { background: #f0fdf4; color: var(--sem-verde); }

  .card-resp { font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 5px; }
  .avatar {
    width: 22px; height: 22px; border-radius: 50%; background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 700; color: #fff;
  }
  .card-date {
    font-size: 10px; color: var(--muted); font-family: 'DM Mono', monospace;
    margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border-soft);
  }

  .empty-col { text-align: center; padding: 36px 16px; color: var(--muted); font-size: 12px; }

  /* LOADING */
  #loading-screen {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 14px; z-index: 100;
  }
  .spinner {
    width: 32px; height: 32px; border: 3px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading-screen p { font-size: 13px; color: var(--muted); font-family: 'DM Mono', monospace; }

  .hidden { display: none !important; }
</style>
</head>
<body>

<div id="loading-screen">
  <div class="spinner"></div>
  <p>Cargando tablero…</p>
</div>

<header>
  <div class="header-left">
    <div class="logo">DCP</div>
    <div>
      <h1>Tablero de Control</h1>
      <p>DCP Consulting S.R.L.</p>
    </div>
  </div>
  <div class="header-right">
    <div id="status-indicator">
      <div class="dot loading" id="status-dot"></div>
      <span id="status-text">Conectando…</span>
    </div>
    <button id="refresh-btn" onclick="loadData()">↻ Actualizar</button>
  </div>
</header>

<div class="filters">
  <div class="filter-group">
    <span class="filter-group-label">Estado</span>
    <div class="filter-row">
      <button class="filter-btn active" onclick="setFilter('estado','TODOS',this)">Todos</button>
      <button class="filter-btn" onclick="setFilter('estado','ABIERTO',this)">Abierto</button>
      <button class="filter-btn" onclick="setFilter('estado','CERRADO',this)">Cerrado</button>
    </div>
  </div>
  <div class="filter-group">
    <span class="filter-group-label">Prioridad</span>
    <div class="filter-row">
      <button class="filter-btn active" onclick="setFilter('prioridad','TODOS',this)">Todas</button>
      <button class="filter-btn" onclick="setFilter('prioridad','ALTA',this)">Alta</button>
      <button class="filter-btn" onclick="setFilter('prioridad','MEDIA',this)">Media</button>
      <button class="filter-btn" onclick="setFilter('prioridad','BAJA',this)">Baja</button>
    </div>
  </div>
  <div class="filter-group">
    <span class="filter-group-label">Responsable</span>
    <div class="filter-row">
      <button class="filter-btn active" onclick="setFilter('responsable','TODOS',this)">Todos</button>
      <button class="filter-btn" onclick="setFilter('responsable','TOMAS',this)">Tomás</button>
      <button class="filter-btn" onclick="setFilter('responsable','PABLO',this)">Pablo</button>
      <button class="filter-btn" onclick="setFilter('responsable','BELL',this)">Bell</button>
      <button class="filter-btn" onclick="setFilter('responsable','MANAGEMENT',this)">Management</button>
    </div>
  </div>
</div>

<div class="board" id="board"></div>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTZ3dXeNhTILF_k_oRVuL7aVV0WZ-XCallpDQ4VlpmvRhlzFHhhw4qCIgQnz2K7J9lv2TJhmsf7Z_Kh/pub?gid=0&single=true&output=csv&cachebust=' + Date.now();

const COLUMN_ORDER = ['SOCIETARIO', 'COMERCIAL', 'ESTRATEGICOS', 'DIARIOS'];

const COL_COLORS = {
  SOCIETARIO:   '#7c3aed',
  COMERCIAL:    '#0ea5e9',
  ESTRATEGICOS: '#16a34a',
  DIARIOS:      '#f59e0b',
};

let allCards = [];
let activeFilters = { estado: 'TODOS', prioridad: 'TODOS', responsable: 'TODOS' };

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.trim().replace(/"/g, ''));
  return lines.slice(1).map(line => {
    const vals = [];
    let cur = '', inQ = false;
    for (let c of line) {
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { vals.push(cur.trim()); cur = ''; }
      else cur += c;
    }
    vals.push(cur.trim());
    const obj = {};
    headers.forEach((h, i) => obj[h] = (vals[i] || '').replace(/"/g, '').trim());
    return obj;
  }).filter(r => r.ID);
}

function normalizeStatus(s) {
  return (s || '').toUpperCase().trim() === 'CERRADO' ? 'CERRADO' : 'ABIERTO';
}

function initials(name) {
  if (!name) return '?';
  return name.trim().split(/\s+/).map(w => w[0]).join('').toUpperCase().slice(0, 2);
}

function priClass(pri) {
  const map = { ALTA: 'alta', MEDIA: 'media', BAJA: 'baja' };
  return 'badge badge-' + (map[(pri||'').toUpperCase()] || 'baja');
}

function renderCard(item) {
  const pri    = (item.PRIORIDAD   || 'BAJA').toUpperCase().trim();
  const estado = normalizeStatus(item.ESTADO);
  const estadoClass = estado === 'CERRADO' ? 'estado-cerrado' : 'estado-abierto';

  return `
    <div class="card" data-pri="${pri}">
      <div class="card-top">
        <span class="card-title">${item.TITULO || '—'}</span>
        <span class="estado-badge ${estadoClass}">${estado}</span>
      </div>
      <p class="card-detail">${item.DETALLE || ''}</p>
      <div class="card-footer">
        <span class="${priClass(pri)}">${pri}</span>
        <div class="card-resp">
          <div class="avatar">${initials(item.RESPONSABLE)}</div>
          ${item.RESPONSABLE || ''}
        </div>
      </div>
      <div class="card-date">${item.FECHA_CREACION || ''}</div>
    </div>`;
}

function render() {
  const filtered = allCards.filter(item => {
    const estado = normalizeStatus(item.ESTADO);
    const pri    = (item.PRIORIDAD   || '').toUpperCase().trim();
    const resp   = (item.RESPONSABLE || '').toUpperCase().trim();
    if (activeFilters.estado      !== 'TODOS' && estado !== activeFilters.estado)      return false;
    if (activeFilters.prioridad   !== 'TODOS' && pri    !== activeFilters.prioridad)   return false;
    if (activeFilters.responsable !== 'TODOS' && resp   !== activeFilters.responsable) return false;
    return true;
  });

  // Determinar columnas: orden fijo + cualquier otra que aparezca en los datos
  const extraCols = [...new Set(allCards.map(c => (c.COLUMNA||'').toUpperCase().trim()))]
    .filter(c => c && !COLUMN_ORDER.includes(c));
  const cols = [...COLUMN_ORDER, ...extraCols];

  const board = document.getElementById('board');
  board.innerHTML = '';

  cols.forEach(colKey => {
    const cards = filtered.filter(i => (i.COLUMNA||'').toUpperCase().trim() === colKey);
    // Si no hay ninguna tarjeta en esa columna (ni siquiera sin filtro), no mostrar la columna
    const totalInCol = allCards.filter(i => (i.COLUMNA||'').toUpperCase().trim() === colKey).length;
    if (totalInCol === 0) return;

    const color = COL_COLORS[colKey] || '#64748b';
    const label = colKey.charAt(0) + colKey.slice(1).toLowerCase();

    const col = document.createElement('div');
    col.className = 'column';
    col.innerHTML = `
      <div class="col-header">
        <div class="col-header-left">
          <div class="col-stripe" style="background:${color}"></div>
          <span class="col-title" style="color:${color}">${label}</span>
        </div>
        <span class="col-count">${cards.length}</span>
      </div>
      <div class="col-body">
        ${cards.length ? cards.map(renderCard).join('') : '<div class="empty-col">Sin tareas</div>'}
      </div>`;
    board.appendChild(col);
  });
}

function setFilter(type, val, btn) {
  activeFilters[type] = val;
  // Desactivar hermanos del mismo grupo
  btn.closest('.filter-row').querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

async function loadData() {
  const dot  = document.getElementById('status-dot');
  const txt  = document.getElementById('status-text');
  dot.className = 'dot loading';
  txt.textContent = 'Actualizando…';

  try {
    const url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTZ3dXeNhTILF_k_oRVuL7aVV0WZ-XCallpDQ4VlpmvRhlzFHhhw4qCIgQnz2K7J9lv2TJhmsf7Z_Kh/pub?gid=0&single=true&output=csv&t=' + Date.now();
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const csv = await res.text();
    allCards = parseCSV(csv);
    render();
    dot.className = 'dot';
    txt.textContent = 'Actualizado ' + new Date().toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });
  } catch (e) {
    dot.className = 'dot error';
    txt.textContent = 'Error al cargar datos';
    document.getElementById('board').innerHTML = '<div style="padding:40px;color:#dc2626;font-size:13px;">⚠ No se pudieron cargar los datos. Verificá que el sheet esté publicado como CSV.</div>';
    console.error(e);
  }

  document.getElementById('loading-screen').classList.add('hidden');
}

loadData();
</script>
</body>
</html>
